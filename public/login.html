<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eventify</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-container h2 {
            margin-top: 0;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #3788d8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover {
            background-color: #2c6fb0;
        }
        .toggle-text {
            margin-top: 15px;
            font-size: 14px;
        }
        .toggle-text a {
            color: #3788d8;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 id="formTitle">Login Eventify</h2>
        
        <form id="authForm">
            <div class="form-group" id="usernameGroup" style="display: none;">
                <label>Nama Pengguna / Organisasi</label>
                <input type="text" id="username">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            
            <button type="submit" id="submitBtn">Masuk</button>
        </form>

        <p class="toggle-text" id="toggleText">
            Belum punya akun? <a id="toggleLink">Daftar sekarang</a>
        </p>
    </div>

    <script>
        let isLoginMode = true; 

        document.getElementById('toggleLink').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('formTitle').innerText = isLoginMode ? 'Login Eventify' : 'Daftar Eventify';
            document.getElementById('submitBtn').innerText = isLoginMode ? 'Masuk' : 'Daftar';
            document.getElementById('usernameGroup').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('toggleText').innerHTML = isLoginMode 
                ? 'Belum punya akun? <a id="toggleLink">Daftar sekarang</a>' 
                : 'Sudah punya akun? <a id="toggleLink">Login di sini</a>';
            
            document.getElementById('toggleLink').addEventListener('click', arguments.callee);
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            const url = isLoginMode ? '/users/login' : '/users/register';
            const payload = isLoginMode ? { email, password } : { username, email, password };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message);
                    localStorage.setItem('eventify_user', JSON.stringify(data.user));
                    window.location.href = '/index.html'; 
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Terjadi kesalahan server');
            }
        });
    </script>
</body>
</html>
